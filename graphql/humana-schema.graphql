  riskScore: Float
  riskCategory: String
  recommendations: [String!]!
  nextAssessmentDue: Date
}

"""A Go365 / GoHealthyTogether wellness engagement record."""
type GoHealthyTogether {
  id: ID!
  memberId: String!
  enrollmentDate: Date!
  activeChallenges: [String!]!
  completedActivities: Int!
  pointsEarned: Int!
  tier: String
  rewardsAvailable: Money
}

