# ---------------------------------------------------------------------------
# Platform and Security
# ---------------------------------------------------------------------------

"""An API key credential issued through the Humana developer portal."""
type APIKey {
  id: ID!
  keyId: String!
  name: String!
  createdDate: DateTime!
  expirationDate: DateTime
  scopes: [String!]!
  active: Boolean!
  lastUsed: DateTime
}

"""An OAuth 2.0 access or refresh token for Humana API access."""
type Token {
  accessToken: String!
  tokenType: String!
  expiresIn: Int!
  refreshToken: String
  scope: String!
  issuedAt: DateTime!
}

"""A webhook subscription for Humana platform events."""
type Webhook {
  id: ID!
  webhookId: String!
  targetUrl: String!
  events: [WebhookEvent!]!
  active: Boolean!
  secret: String
  createdDate: DateTime!
  lastTriggered: DateTime
  failureCount: Int!
}

# ---------------------------------------------------------------------------
# Supporting Types
# ---------------------------------------------------------------------------

"""A postal address."""
type Address {
  line1: String!
  line2: String
  city: String!
  state: String!
  postalCode: String!
  county: String
  country: String
}

# ---------------------------------------------------------------------------
# Root Types
# ---------------------------------------------------------------------------

type Query {
  """Look up a member by their Humana member ID."""
  member(memberId: String!): Member

  """Search for providers in the directory."""
  providers(
    type: ProviderType
    specialty: String
    zipCode: String
    radius: Float
    planId: String
    acceptingNewPatients: Boolean
    networkStatus: NetworkStatus
    limit: Int
    offset: Int
  ): [Provider!]!

  """Look up a specific provider by NPI."""
  provider(npi: String!): Provider

  """Get the provider directory for a specific plan."""
  providerDirectory(planId: String!): ProviderDirectory

  """Look up a specific claim."""
  claim(claimId: String!): Claim

  """List claims for a member."""
  claims(memberId: String!, startDate: Date, endDate: Date, status: ClaimStatusCode, limit: Int, offset: Int): [Claim!]!

  """Get an Explanation of Benefits document."""
  explanationOfBenefits(eobId: String!): ExplanationOfBenefits

  """Get all EOBs for a member."""
  memberEOBs(memberId: String!, startDate: Date, endDate: Date, limit: Int): [ExplanationOfBenefits!]!

  """Look up an insurance plan by plan ID."""
  insurancePlan(planId: String!): InsurancePlan

  """Search for Medicare plans by county and plan type."""
  medicarePlans(county: String!, state: String!, planType: PlanType): [MedicarePlan!]!

  """Get the drug formulary for a plan."""
  formulary(planId: String!): DrugFormulary

  """Search for a drug in the formulary."""
  formularyDrug(planId: String!, rxcui: String!): FormularyDrug

  """Search for pharmacies."""
  pharmacies(zipCode: String!, radius: Float, planId: String, mailOrder: Boolean, limit: Int): [Pharmacy!]!

  """Get a prior authorization by authorization number."""
  preAuth(authorizationNumber: String!): PreAuth

  """List prior authorizations for a member."""
  memberPreAuths(memberId: String!, status: AuthorizationStatus, limit: Int): [PreAuth!]!

  """Get an employer record."""
  employer(employerId: String!): Employer

  """Get wellness information for a member."""
  memberWellness(memberId: String!): Wellness

  """List API keys for the authenticated application."""
  apiKeys: [APIKey!]!

  """List active webhook subscriptions."""
  webhooks: [Webhook!]!
}

"""Input for selecting a new PCP."""
input PCPSelectionInput {
  memberId: String!
  pcpNpi: String!
  effectiveDate: Date!
  reason: String
}

"""Input for submitting a prior authorization request."""
input PreAuthInput {
  memberId: String!
  requestingProviderNpi: String!
  serviceType: String!
  diagnosisCodes: [String!]!
  procedureCodes: [String!]!
  urgency: String
  clinicalNotes: String
}

"""Input for placing a prescription order."""
input PrescriptionOrderInput {
  memberId: String!
  rxcui: String!
  prescribingProviderNpi: String!
  ncpdpId: String
  daysSupply: Int!
  mailOrder: Boolean!
}

"""Input for creating or updating a webhook."""
input WebhookInput {
  targetUrl: String!
  events: [WebhookEvent!]!
  active: Boolean!
  secret: String
}

"""Input for enrolling in a wellness program."""
input WellnessEnrollmentInput {
  memberId: String!
  programName: String!
}

type Mutation {
  """Select or change a member's PCP."""
  selectPCP(input: PCPSelectionInput!): PCPSelection

  """Submit a prior authorization request."""
  submitPreAuth(input: PreAuthInput!): PreAuth

  """Place a prescription order."""
  orderPrescription(input: PrescriptionOrderInput!): PrescriptionOrder

  """Create a new webhook subscription."""
  createWebhook(input: WebhookInput!): Webhook

  """Update an existing webhook subscription."""
  updateWebhook(webhookId: String!, input: WebhookInput!): Webhook

  """Delete a webhook subscription."""
  deleteWebhook(webhookId: String!): Boolean

  """Enroll a member in a wellness program."""
  enrollWellness(input: WellnessEnrollmentInput!): Wellness

  """Revoke an API key."""
  revokeAPIKey(keyId: String!): Boolean
}
